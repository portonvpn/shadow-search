<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #b8f562;
      --accent-dim: rgba(184,245,98,0.12);
      --text: #e8e8e8;
      --muted: #555;
      --url-color: #6dbf8a;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* ── HOME ── */
    #home {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; padding: 2rem;
      gap: 2.5rem; animation: fadeIn 0.6s ease;
    }
    #home.hidden { display: none; }

    .ghost-icon { font-size: 3.5rem; display: block; margin-bottom: 0.5rem; filter: drop-shadow(0 0 20px rgba(184,245,98,0.3)); animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .logo-name { font-family: 'Space Mono', monospace; font-size: 1.8rem; font-weight: 700; }
    .logo-name span { color: var(--accent); }
    .tagline { font-size: 0.78rem; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.4rem; text-align: center; }

    .search-wrap { width: 100%; max-width: 640px; }
    .search-wrap form, .top-search-wrap form {
      display: flex; border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden; background: var(--surface);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap form:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(184,245,98,0.1); }

    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 1rem; padding: 0.9rem 1.2rem; caret-color: var(--accent);
    }
    .search-input::placeholder { color: var(--muted); }

    .search-btn {
      background: var(--accent); border: none; color: #0a0a0a;
      font-family: 'Space Mono', monospace; font-size: 0.78rem;
      font-weight: 700; padding: 0 1.4rem; cursor: pointer;
      letter-spacing: 0.05em; transition: background 0.15s;
    }
    .search-btn:hover { background: #caff6e; }

    .privacy-badges { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .badge { font-family: 'Space Mono', monospace; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 0.35rem; }
    .badge::before { content: '✓'; color: var(--accent); }

    /* ── RESULTS PAGE ── */
    #results-page { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }
    #results-page.visible { display: block; }

    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.7rem 1.5rem; display: flex; align-items: center; gap: 1rem;
    }
    .top-logo { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--text); cursor: pointer; flex-shrink: 0; }
    .top-logo span { color: var(--accent); }

    .top-search-wrap { flex: 1; max-width: 540px; }
    .top-search-wrap form:focus-within { border-color: var(--accent); }

    .top-search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; padding: 0.55rem 1rem; caret-color: var(--accent);
    }
    .top-search-input::placeholder { color: var(--muted); }

    .top-search-btn {
      background: transparent; border: none; border-left: 1px solid var(--border);
      color: var(--accent); padding: 0 0.9rem; cursor: pointer;
      font-size: 1rem; transition: background 0.15s;
    }
    .top-search-btn:hover { background: var(--accent-dim); }

    .results-area { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    .results-meta { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.06em; margin-bottom: 1.8rem; text-transform: uppercase; }
    .results-meta strong { color: var(--accent); }

    .result-item { margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); animation: fadeIn 0.3s ease both; }
    .result-item:last-child { border-bottom: none; }

    .result-url { font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--url-color); margin-bottom: 0.3rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .result-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 0.4rem; line-height: 1.4; }
    .result-title a { color: var(--text); text-decoration: none; cursor: pointer; transition: color 0.15s; }
    .result-title a:hover { color: var(--accent); }
    .result-desc { font-size: 0.88rem; color: #999; line-height: 1.6; }

    /* ── LOADING ── */
    #loading { display: none; text-align: center; padding: 4rem 1rem; }
    #loading.active { display: block; }
    .loading-dots { display: inline-flex; gap: 0.5rem; margin-bottom: 1rem; }
    .loading-dots span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.2;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
    .loading-text { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

    .error-box { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); border-radius: 4px; padding: 1.2rem 1.5rem; font-family: 'Space Mono', monospace; font-size: 0.82rem; color: #ff7070; margin-top: 1rem; }
    .no-results { text-align: center; padding: 3rem 1rem; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.82rem; }

    /* ══════════════════════════════════════
       IFRAME VIEWER OVERLAY
    ══════════════════════════════════════ */
    #viewer {
      display: none;
      position: fixed; inset: 0; z-index: 1000;
      flex-direction: column;
      background: var(--bg);
    }
    #viewer.open { display: flex; }

    .viewer-bar {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.5rem 0.8rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .viewer-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text); font-family: 'Space Mono', monospace;
      font-size: 0.75rem; padding: 0.3rem 0.7rem;
      border-radius: 3px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .viewer-btn:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .viewer-btn.close { color: #ff7070; border-color: rgba(255,112,112,0.3); }
    .viewer-btn.close:hover { background: rgba(255,80,80,0.1); border-color: #ff7070; }

    .viewer-url {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; color: var(--muted); font-family: 'Space Mono', monospace;
      font-size: 0.72rem; padding: 0.3rem 0.7rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .viewer-open-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: 'Space Mono', monospace;
      font-size: 0.7rem; padding: 0.3rem 0.6rem;
      border-radius: 3px; cursor: pointer; text-decoration: none;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .viewer-open-btn:hover { color: var(--accent); }

    #viewer-iframe {
      flex: 1; border: none; width: 100%; height: 100%;
      background: #fff;
    }

    .viewer-loading {
      position: absolute; inset: 48px 0 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 10;
      font-family: 'Space Mono', monospace; font-size: 0.8rem;
      color: var(--muted); flex-direction: column; gap: 1rem;
      pointer-events: none;
    }
    .viewer-loading.hidden { display: none; }

    @media (max-width: 600px) {
      .top-bar { gap: 0.6rem; padding: 0.6rem 1rem; }
      .results-area { padding: 1.2rem 1rem 3rem; }
      .viewer-url { display: none; }
    }
  </style>
</head>
<body>

  <!-- HOME -->
  <div id="home">
    <div style="text-align:center">
      <span class="ghost-icon">👻</span>
      <div class="logo-name">Ghost<span>Search</span></div>
      <div class="tagline">No history · No tracking · No logs</div>
    </div>
    <div class="search-wrap">
      <form id="home-form">
        <input class="search-input" type="text" name="q"
          autocomplete="off" autocorrect="off" autocapitalize="off"
          spellcheck="false" placeholder="Search anything..." autofocus>
        <button class="search-btn" type="submit">SEARCH</button>
      </form>
    </div>
    <div class="privacy-badges">
      <span class="badge">No URL history</span>
      <span class="badge">No autocomplete</span>
      <span class="badge">Sites hidden from history</span>
    </div>
  </div>

  <!-- RESULTS PAGE -->
  <div id="results-page">
    <div class="top-bar">
      <div class="top-logo" onclick="goHome()">Ghost<span>Search</span></div>
      <div class="top-search-wrap">
        <form id="top-form">
          <input class="top-search-input" type="text" name="q"
            autocomplete="off" autocorrect="off" autocapitalize="off"
            spellcheck="false" placeholder="Search again...">
          <button class="top-search-btn" type="submit">→</button>
        </form>
      </div>
    </div>
    <div class="results-area">
      <div id="loading">
        <div class="loading-dots"><span></span><span></span><span></span></div>
        <div class="loading-text">Fetching results...</div>
      </div>
      <div id="results-output"></div>
    </div>
  </div>

  <!-- IFRAME VIEWER -->
  <div id="viewer">
    <div class="viewer-bar">
      <button class="viewer-btn close" onclick="closeViewer()">✕ Close</button>
      <button class="viewer-btn" onclick="goBack()">← Back</button>
      <div class="viewer-url" id="viewer-url-display"></div>
      <a class="viewer-open-btn" id="viewer-direct-link" href="#" target="_blank" rel="noopener noreferrer">↗ Open directly</a>
    </div>
    <div class="viewer-loading" id="viewer-loading">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <div>Loading page...</div>
    </div>
    <iframe id="viewer-iframe" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
  </div>

  <script>
    let currentUrl = '';

    // ── Prevent back-button cache from restoring page with filled inputs
    window.addEventListener('pageshow', (e) => {
      if (e.persisted) {
        document.querySelectorAll('input[name="q"]').forEach(i => i.value = '');
        showHome();
      }
    });

    function showHome() {
      document.getElementById('home').classList.remove('hidden');
      document.getElementById('results-page').classList.remove('visible');
      closeViewer();
    }

    function goHome() { showHome(); }

    // ── Open a URL inside the iframe viewer (no history entry)
    function openInViewer(url) {
      currentUrl = url;
      const viewer = document.getElementById('viewer');
      const iframe = document.getElementById('viewer-iframe');
      const urlDisplay = document.getElementById('viewer-url-display');
      const directLink = document.getElementById('viewer-direct-link');
      const loading = document.getElementById('viewer-loading');

      urlDisplay.textContent = url;
      directLink.href = url;
      loading.classList.remove('hidden');
      iframe.src = '';

      viewer.classList.add('open');

      // Load through proxy to strip X-Frame-Options
      iframe.src = '/api/proxy?url=' + encodeURIComponent(url);

      iframe.onload = () => {
        loading.classList.add('hidden');
      };
    }

    function closeViewer() {
      const viewer = document.getElementById('viewer');
      const iframe = document.getElementById('viewer-iframe');
      viewer.classList.remove('open');
      iframe.src = '';
    }

    function goBack() {
      closeViewer();
    }

    // ── Search logic
    async function doSearch(query) {
      if (!query.trim()) return;
      document.getElementById('home').classList.add('hidden');
      document.getElementById('results-page').classList.add('visible');
      document.querySelector('.top-search-input').value = query;

      const output = document.getElementById('results-output');
      const loading = document.getElementById('loading');
      output.innerHTML = '';
      loading.classList.add('active');

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: query })
        });
        const data = await res.json();
        loading.classList.remove('active');

        if (data.error) {
          output.innerHTML = `<div class="error-box">⚠ ${esc(data.error)}</div>`;
          return;
        }

        if (!data.results || data.results.length === 0) {
          output.innerHTML = `<div class="no-results">No results found for "<strong>${esc(query)}</strong>"</div>`;
          return;
        }

        const meta = `<div class="results-meta">Showing <strong>${data.results.length}</strong> results for "<strong>${esc(query)}</strong>"</div>`;

        const items = data.results.map((r, i) => `
          <div class="result-item" style="animation-delay:${i * 40}ms">
            <div class="result-url">${esc(displayUrl(r.url))}</div>
            <div class="result-title">
              <a onclick="openInViewer('${esc(r.url)}')">${esc(r.title)}</a>
            </div>
            ${r.description ? `<div class="result-desc">${esc(r.description)}</div>` : ''}
          </div>
        `).join('');

        output.innerHTML = meta + items;

      } catch (err) {
        loading.classList.remove('active');
        output.innerHTML = `<div class="error-box">⚠ ${esc(err.message)}</div>`;
      }
    }

    function displayUrl(url) {
      try { const u = new URL(url); return u.hostname + u.pathname; } catch { return url; }
    }

    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
    }

    document.getElementById('home-form').addEventListener('submit', e => {
      e.preventDefault();
      const q = e.target.q.value.trim();
      if (q) doSearch(q);
    });

    document.getElementById('top-form').addEventListener('submit', e => {
      e.preventDefault();
      const q = e.target.q.value.trim();
      if (q) doSearch(q);
    });

    // Close viewer with Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeViewer();
    });
  </script>
</body>
</html>
